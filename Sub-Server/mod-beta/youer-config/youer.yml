# This is the main configuration file for Youer.
# As you can see, there's tons to configure. Some options may impact gameplay, so use
# with caution, and make sure you know what each option does before configuring.
# For a reference for any variable inside this file, check out the Youer wiki at
# - [English Documentation](https://mohistmc.com/youer/docs)
# - [中文文档](https://www.mohistmc.cn/docs/youer)
#
# If you need help with the configuration or have any questions related to Spigot,
# join us at the Discord or drop by our forums and leave a post.
#
# Discord: https://discord.gg/mohistmc
# Forums: https://mohistmc.com/
# Forums (中文): https://www.mohistmc.cn/

anvilfix:
  maximumrepaircost: 40
  enchantment_fix: false
  max_enchantment_level: 32767
max-bees-in-hive: 3
enchantment-table-book-animation-tick: false
threadpriority:
  server_thread: 8
entity:
  clear:
    item:
      enable: false
      whitelist: []
      msg: '[Server] Cleaned up %size% drop item'
      time: 1800
    monster:
      enable: false
      whitelist: []
      msg: '[Server] Cleaned up %size% monster'
      time: 1800
bans:
  item: false
  entity:
    enable: false
    vanilla_entity:
      enable: false
      whitelist: []
  enchantment: false
  recipe: false
settings:
  messages:
    ping-command-output: §2%s's ping is %sms
events:
  fire_tick: false
  explosion: false
neoforge:
  bukkitpermissionshandler: true
worldmanage: true
recipe:
  warn: false
tpa:
  enable: false
  permissions: true
back:
  enable: false
  permissions: true
permissions:
  debug:
    console: false
    player: false
pluginchannel:
  debug: false
deepseek:
  enable: false
  baseUrl: https://api.deepseek.com/chat/completions
  apikey: youer
  model: deepseek-chat
  system: 你的名字叫小小墨，年龄18岁，是个可爱的女孩子!
  command: ai
  all_command: ai-all
  chatformat: <小小墨> %s
warps:
  enable: false
custom:
  no_villager: false
  entity_tp_end: true
  entity_tp_nether: true
  raid_no_emerald: false
  lava_speed:
    normal: 30
    nether: 10
youer:
  show_logo: true
  watchdog_spigot: true
  watchdog_mohist: false
  lang: en_US
  check_update: true
  libraries:
    check: true
  installation-finished: false
networkmanager:
  debug: false
  intercept: []
config-version: 1
keepinventory:
  global:
    enable: false
    inventory: true
    exp: true
  permission:
    enable: false
    inventory: youer.keepinventory.inventory
    exp: youer.keepinventory.exp
  world:
    inventory: false
    exp: false
