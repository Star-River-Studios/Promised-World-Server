services:
  # 应许之世-Velocity代理服务器
  pw-velocity:
    build:
      context: ./
      dockerfile: Dockerfile
    image: promised-world:latest
    container_name: Promised-World_Velocity
    restart: always
    stop_grace_period: 30s
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./Velocity:/app/Promised-World/Velocity:rw
    working_dir: /app/Promised-World/Velocity
    command: ["bash", "-c", "chmod +x ./Start.sh && exec ./Start.sh"]
    networks:
      - pw-network
    ports:
      - 12000:12000/tcp

  # 应许之世-大厅服务器
  pw-lobby:
    image: promised-world:latest
    container_name: Promised-World_Lobby-Server
    restart: always
    stop_grace_period: 1m
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./Sub-Server:/app/Promised-World/Sub-Server:rw
    working_dir: /app/Promised-World/Sub-Server/lobby
    command: ["bash", "-c", "chmod +x ./Start.sh && exec ./Start.sh"]
    networks:
      - pw-network
    depends_on:
      - pw-velocity

  # 应许之世-模组生存服务器（Alpha测试服）
  pw-mod-alpha:
    image: promised-world:latest
    container_name: Promised-World_Mod-Alpha-Server
    restart: always
    stop_grace_period: 1m
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./Sub-Server:/app/Promised-World/Sub-Server:rw
    working_dir: /app/Promised-World/Sub-Server/mod-alpha
    command: ["bash", "-c", "chmod +x ./Start.sh && exec ./Start.sh"]
    networks:
      - pw-network
    depends_on:
      - pw-velocity

  # 应许之世-模组生存服务器（Beta测试服）
  pw-mod-beta:
    image: promised-world:latest
    container_name: Promised-World_Mod-Beta-Server
    restart: always
    stop_grace_period: 1m
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./Sub-Server:/app/Promised-World/Sub-Server:rw
    working_dir: /app/Promised-World/Sub-Server/mod-beta
    command: ["bash", "-c", "chmod +x ./Start.sh && exec ./Start.sh"]
    networks:
      - pw-network
    depends_on:
      - pw-velocity

  # 应许之世-插件生存服务器
  pw-survival:
    image: promised-world:latest
    container_name: Promised-World_Survival-Server
    restart: always
    stop_grace_period: 1m
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./Sub-Server:/app/Promised-World/Sub-Server:rw
    working_dir: /app/Promised-World/Sub-Server/survival
    command: ["bash", "-c", "chmod +x ./Start.sh && exec ./Start.sh"]
    networks:
      - pw-network
    depends_on:
      - pw-velocity

networks:
  # 应许之世-内部桥接网络
  pw-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:dead:beef:1::/64
          gateway: fd00:dead:beef:1::1